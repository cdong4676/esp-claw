devices:
  - name: camera         # The name of the device, must be unique
    type: camera         # The type of the camera, must be equal to "camera"
    version: default
    sub_type: dvp        # The bus type: dvp
    config:
      # DVP interface configuration (used when bus_type is "dvp")
      dvp_config:
        reset_io: -1        # [IO] GPIO pin for reset signal (default: -1, not connected)
        pwdn_io: -1         # [IO] GPIO pin for power down signal (default: -1, not connected)
        vsync_io: 6          # [IO] GPIO pin for vertical sync signal
        data_width: CAM_CTLR_DATA_WIDTH_8  # [TO_BE_CONFIRMED] Data width configuration:
                                             # CAM_CTLR_DATA_WIDTH_8
                                             # CAM_CTLR_DATA_WIDTH_10
                                             # CAM_CTLR_DATA_WIDTH_12
                                             # CAM_CTLR_DATA_WIDTH_16
        de_io: 7             # [IO] GPIO pin for data enable signal (HSYNC)
        pclk_io: 13          # [IO] GPIO pin for pixel clock signal
        xclk_io: 15          # [IO] GPIO pin for external clock output
        xclk_freq: 10000000  # [TO_BE_CONFIRMED] External clock frequency in Hz
        data_io:
          data_io_0: 11      # [IO] GPIO pin for data bit 0
          data_io_1: 9       # [IO] GPIO pin for data bit 1
          data_io_2: 8       # [IO] GPIO pin for data bit 2
          data_io_3: 10      # [IO] GPIO pin for data bit 3
          data_io_4: 12      # [IO] GPIO pin for data bit 4
          data_io_5: 18      # [IO] GPIO pin for data bit 5
          data_io_6: 17      # [IO] GPIO pin for data bit 6
          data_io_7: 16      # [IO] GPIO pin for data bit 7
    # Peripheral configuration
    peripherals:
      # I2C interface configuration
      - name: i2c_master                   # I2C peripheral for camera control
        frequency: 100000                   # I2C frequency in Hz

  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: false
      swap_xy: false
      invert_color: true
      x_max: 240
      y_max: 240
      # esp_lcd_panel_io_spi_config_t fields
      io_spi_config:
        cs_gpio_num: 44
        dc_gpio_num: 43
        spi_mode: 3
        pclk_hz: 40000000

      lcd_panel_config:
        reset_gpio_num: -1
        data_endian: LCD_RGB_ELEMENT_ORDER_RGB
        vendor_config: NULL
    peripherals:
      - name: spi_display
      - name: ledc_backlight
