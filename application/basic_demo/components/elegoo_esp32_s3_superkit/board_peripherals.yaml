version: 1.0.0
# Peripherals Configuration
peripherals:
  - name: i2s_audio_in
    type: i2s
    role: master
    format: std-in
    config:
      port: 0
      sample_rate_hz: 16000
      data_bit_width: 16
      slot_mode: I2S_SLOT_MODE_MONO
      pins:
        bclk: 2
        ws: 41
        din: 42

  - name: i2s_audio_out
    type: i2s
    role: master
    format: std-out
    config:
      port: 1
      sample_rate_hz: 24000
      data_bit_width: 16
      slot_mode: I2S_SLOT_MODE_MONO
      pins:
        bclk: 39
        ws: 40
        dout: 38

  - name: i2c_master
    type: i2c
    role: master
    config:
      port: 0
      pins:
        sda: 4
        scl: 5
      frequency: 400000

  - name: spi_display
    type: spi
    role: master
    config:
      spi_bus_config:
        spi_port: SPI3_HOST
        data0_io_num: 47
        sclk_io_num: 21
        max_transfer_sz: 4800

  - name: ledc_backlight
    type: ledc
    role: none
    config:
      gpio_num: 46
      freq_hz: 5000
      duty: 0
      duty_resolution: LEDC_TIMER_10_BIT
      output_invert: true
